<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Samira</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050205; 
            overflow: hidden; 
            font-family: 'serif'; 
            height: 100vh;
            width: 100vw;
        }
        canvas { display: block; }

        /* Mobile specific layers */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .photo-frame {
            width: 70vw; /* Phone size width */
            height: 90vw;
            border: 5px solid white;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
            opacity: 0;
            background: url('s.jpg') center/cover no-repeat;
            border-radius: 10px;
        }

        .final-text {
            position: absolute;
            color: #fff;
            font-size: 2rem;
            text-shadow: 0 0 15px #ff69b4;
            opacity: 0;
            text-align: center;
            width: 100%;
        }

        /* Rain container */
        #rain-box {
            position: absolute; width: 100%; height: 100%;
            top: 0; opacity: 0;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="photo-frame" id="photo"></div>
        <div class="final-text" id="finalMsg">I Love You 😗</div>
    </div>
    <div id="rain-box"></div>
    <canvas id="mainCanvas"></canvas>

<script>
/**
 * MOBILE CINEMATIC ENGINE
 */
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let width, height;

function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', init);
init();

class Particle {
    constructor(x, y, color) {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.tx = x; this.ty = y; // Target positions
        this.color = color;
        this.size = Math.random() * 1.5 + 0.5;
        this.alpha = 0;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color}, ${this.alpha})`;
        ctx.fill();
    }
    update() {
        this.x += (this.tx - this.x) * 0.08;
        this.y += (this.ty - this.y) * 0.08;
        if(this.alpha < 1) this.alpha += 0.02;
    }
}

// 1. Text to Particles function (Mobile optimized resolution)
function spawnText(text) {
    particles = [];
    ctx.clearRect(0, 0, width, height);
    ctx.font = `bold ${width/5}px Georgia`; // Adaptive font size
    ctx.textAlign = "center";
    ctx.fillText(text, width/2, height/2);

    const imgData = ctx.getImageData(0, 0, width, height).data;
    ctx.clearRect(0, 0, width, height);

    for (let y = 0; y < height; y += 8) { // Step 8 for mobile performance
        for (let x = 0; x < width; x += 8) {
            if (imgData[(y * width + x) * 4 + 3] > 128) {
                particles.push(new Particle(x, y, "255, 192, 203"));
            }
        }
    }
}

// 2. ANIMATION TIMELINE
const tl = gsap.timeline();

// Step 1: LOVE word
tl.to({}, { duration: 1, onStart: () => spawnText("LOVE") });

// Step 2: Samira Name (Magical transition)
tl.to({}, { duration: 3, delay: 2, onStart: () => spawnText("Samira") });

// Step 3: Photo Flash
tl.to("#photo", { opacity: 1, scale: 1.05, duration: 1.5, delay: 1 });
tl.to("#photo", { opacity: 0, scale: 0.9, duration: 1, delay: 2 });

// Step 4: Lightning & Rain
tl.to("body", { backgroundColor: "#111", duration: 1 });
tl.to("body", { backgroundColor: "#fff", duration: 0.1, repeat: 1, yoyo: true, delay: 0.5 }); // Lightning
tl.to("body", { backgroundColor: "#050205", duration: 1 });

// Step 5: Final Message
tl.to({}, { duration: 0.5, onStart: () => { particles = []; } }); // Clear canvas
tl.to("#finalMsg", { opacity: 1, y: -20, duration: 2 });

// Main Loop
function render() {
    ctx.fillStyle = 'rgba(5, 2, 5, 0.15)';
    ctx.fillRect(0, 0, width, height);
    
    particles.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(render);
}
render();

</script>
</body>
</html>
