<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Samira</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050205; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        #stage {
            position: relative;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        /* Sabse pehle text layers */
        .text-glow {
            position: absolute;
            color: #fff;
            font-family: 'Georgia', serif;
            font-size: 3rem;
            text-align: center;
            text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
            opacity: 0;
            filter: blur(5px);
        }

        /* Photo Frame */
        #photo {
            position: absolute;
            width: 250px; height: 350px;
            border: 6px solid #fff;
            box-shadow: 0 0 30px rgba(255,105,180,0.5);
            background: url('s.jpg') center/cover no-repeat;
            opacity: 0;
            border-radius: 15px;
            z-index: 5;
        }

        /* Rain effect */
        .rain {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            pointer-events: none; opacity: 0;
        }

        /* Particles Layer */
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="stage">
        <div id="word-love" class="text-glow">LOVE</div>
        <div id="word-name" class="text-glow">Samira</div>
        <div id="photo"></div>
        <div id="final-msg" class="text-glow" style="font-size: 2rem;">I Love You 😗</div>
        <div class="rain" id="rain-layer"></div>
    </div>
    
    <canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h;

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Cinematic Sequence
    const tl = gsap.timeline();

    // 1. LOVE Fades in with soft blur removal
    tl.to("#word-love", { opacity: 1, filter: "blur(0px)", duration: 2.5, ease: "power2.out" });
    tl.to("#word-love", { opacity: 0, filter: "blur(10px)", duration: 1.5, delay: 1 });

    // 2. SAMIRA Name
    tl.to("#word-name", { opacity: 1, filter: "blur(0px)", duration: 2.5, ease: "elastic.out(1, 0.5)" });
    tl.to("#word-name", { opacity: 0, scale: 1.5, duration: 1.5, delay: 1.5 });

    // 3. Photo Flash
    tl.to("#photo", { opacity: 1, scale: 1, duration: 1.2, ease: "power4.out" });
    tl.to("body", { backgroundColor: "#1a1a2e", duration: 2 }); // Mood Change
    tl.to("#photo", { opacity: 0, duration: 1, delay: 2.5 });

    // 4. Lightning & Rain
    tl.to("#rain-layer", { opacity: 1, duration: 1 });
    tl.to("body", { backgroundColor: "#fff", duration: 0.1, repeat: 1, yoyo: true }); // Lightning
    tl.to("body", { backgroundColor: "#050205", duration: 1 });

    // 5. Final Message
    tl.to("#final-msg", { opacity: 1, filter: "blur(0px)", duration: 2, delay: 1 });

    // Background Particle Loop (Low CPU intensity for Mobile)
    let dots = [];
    for(let i=0; i<40; i++) {
        dots.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 2,
            v: Math.random() * 0.5 + 0.2
        });
    }

    function animate() {
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = "rgba(255, 182, 193, 0.5)";
        dots.forEach(d => {
            d.y -= d.v;
            if(d.y < 0) d.y = h;
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
